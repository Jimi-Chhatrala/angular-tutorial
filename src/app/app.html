<h2>Signals</h2>

<p>Normal value: {{ normalValue }}</p>
<p>Signal value: {{ signalValue() }}</p>

<button (click)="signalValue.set(50)">Change Signal</button>
<!-- <button (click)="normalValue++">Change Normal Value</button> -->

<h1>Count: {{ signalValue() }}</h1>

<button (click)="increment()">Plus</button>
<button (click)="decrement()">Minus</button>
<button (click)="reset()">Reset</button>
