<input type="text" (input)="updateName($event.target.value)" placeholder="Enter any name" />

<p>Your name: {{ name }}</p>

<input type="text" (input)="city = $event.target.value" placeholder="Enter any city" />

<p>Your city: {{ city }}</p>

<input type="text" placeholder="Enter email" #userEmail />

<button (click)="getEmail(userEmail.value)">Get Email</button>

<p>Your email: {{ email }}</p>
