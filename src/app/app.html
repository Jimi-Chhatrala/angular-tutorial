@if (isLoggedIn) {
  <h1>Hello, Admin</h1>
} @else {
  <h2>Please login.</h2>
}

<input
  type="number"
  name="age"
  id="age"
  (input)="updatedAge($event.target.value)"
  placeholder="Enter a age"
  [value]="age"
/>

@if (age >= 18) {
  <p>You are Adult.</p>
} @else {
  <p>You are Minor.</p>
}

<button (click)="toggleBox()">Toggle text</button>

@if (showText) {
  <p>Click Toggle text button to Hide and Show Text.</p>
}
